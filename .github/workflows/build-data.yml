name: Export GPKG to GeoJSON

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo (manual, with LFS)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin ${{ github.ref_name }}
          git checkout -B ${{ github.ref_name }} FETCH_HEAD
          git lfs install
          git lfs fetch origin ${{ github.ref_name }}
          git lfs checkout

      - name: Sanity check data file
        run: |
          ls -lah src/data
          file src/data/lrgdm.gpkg || true

      - name: Export enriched GeoJSON + manifest
        run: |
          python3 scripts/export_geojson.py

      - name: Commit changes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -n "$(git status --porcelain docs/data)" ]; then
            git add docs/data
            git commit -m "Auto-export GeoJSON from GPKG"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          else
            echo "No changes to commit"
          fi
